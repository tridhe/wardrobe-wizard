<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f2328" />
    <title>Wardrobe Wizard is offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f8fafc;
        color: #1f2328;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 420px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 12px 0 0;
        color: #59636e;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        margin-top: 24px;
        color: #1f2328;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>
        Wardrobe Wizard needs a connection for fresh closet data and AI styling. Previously cached
        assets will be available again when your network returns.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
